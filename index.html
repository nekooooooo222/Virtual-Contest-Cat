<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>バチャコン ライブオーバーレイ</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #555; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #777; }

        body { background-color: #1e1e1e; color: #ffffff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; gap: 10px; height: 100vh; box-sizing: border-box; font-size: 9px; overflow: hidden; }
        .main-container { display: flex; flex-direction: row; gap: 0; flex-grow: 1; overflow: hidden; }
        
        @media (min-width: 901px) {
            .main-container { flex-direction: row; }
            .score-panel { width: 60%; flex-shrink: 0; border-right: 1px solid #555; padding-right: 10px; }
            .sub-panel { width: 40%; flex-shrink: 0; padding-left: 10px; }
        }
        @media (max-width: 900px) {
            .main-container { flex-direction: column; overflow-y: auto; }
            .score-panel { width: 100%; flex: 1 1 50%; min-height: 250px; border-right: none !important; border-bottom: 1px solid #555; padding-right: 0 !important; padding-bottom: 10px; margin-bottom: 10px; }
            .sub-panel { width: 100%; flex: 1 1 50%; min-height: 250px; padding-left: 0 !important; }
        }
        
        .panel { background-color: transparent; display: flex; flex-direction: column; overflow: hidden; resize: vertical; min-height: 0; }
        
        .panel-header { background-color: transparent; padding: 4px 8px; font-weight: bold; font-size: 1.4em; border-bottom: 1px solid #555; display: flex; justify-content: space-between; align-items: center; }
        .header-title-wrap { display: flex; align-items: baseline; }
        .header-actions { display: flex; gap: 5px; } 

        .neon-cyan { color: #0ff; text-shadow: 0 0 2px #0ff, 0 0 6px #0ff; letter-spacing: 1px; }
        .neon-yellow { color: #ffea00; text-shadow: 0 0 2px #ffea00, 0 0 6px #ffea00; font-size: 0.75em; margin-left: 15px; font-variant-numeric: tabular-nums; }

        .popout-btn { background: transparent; border: none; color: #aaa; cursor: pointer; padding: 4px; border-radius: 4px; display: flex; align-items: center; justify-content: center; transition: background 0.2s, color 0.2s; }
        .popout-btn:hover { background: #444; color: #fff; }

        .table-container { flex-grow: 1; overflow-x: auto; overflow-y: auto; padding: 4px; position: relative; min-height: 0; }
        .score-list-wrapper { min-width: 600px; }
        .sub-list-wrapper { min-width: 350px; } 

        .header-row { padding: 6px 6px; border-bottom: 2px solid #555; font-weight: bold; color: #eeeeee; align-items: center; position: sticky; top: 0; background-color: #1e1e1e; z-index: 10; }
        .list-container { position: relative; margin-top: 4px; }

        .score-wrapper {
            position: absolute;
            width: 100%;
            height: 32px;
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            z-index: 1;
        }

        .score-content {
            --row-bg: #2a2a2a; 
            width: 100%;
            height: 100%;
            display: grid;
            align-items: center;
            padding: 0 6px;
            box-sizing: border-box;
            border-radius: 4px;
            background-color: var(--row-bg);
            transition: background-color 0.3s ease;
        }
        .score-content.row-odd { --row-bg: #222222; }

        .sub-item {
            --row-bg: #2a2a2a; 
            position: absolute; width: 100%; height: 32px; display: grid; align-items: center;
            padding: 0 6px; box-sizing: border-box; border-radius: 4px;
            background-color: var(--row-bg);
            transition: transform 0.3s cubic-bezier(0.39, 0.575, 0.565, 1), opacity 0.3s ease;
        }
        .sub-item.row-odd { --row-bg: #222222; }

        .pen-text { color: #ff4d4d; font-size: 0.85em; font-weight: bold; } 
        .vrank-text { color: #aaa; font-size: 0.8em; font-weight: normal; }
        .time-text { font-size: 0.85em; color: #bbb; } 
        .score-text { font-weight: bold; font-size: 1.1em; color: #ffcc00; } 
        .prob-cell { line-height: 1.1; } 

        .sub-row, .sub-header-row { display: grid; grid-template-columns: 1.8fr 1.5fr 0.85fr 0.85fr 1.3fr; }
        
        .badge { padding: 2px 4px; border-radius: 3px; font-weight: bold; text-align: center; width: fit-content; color: white; transition: background-color 0.3s; font-size: 0.95em; white-space: nowrap; }
        .badge.ac { background-color: #5cb85c; }
        .badge.wa, .badge.tle, .badge.re, .badge.mle, .badge.ce, .badge.ole, .badge.ie, .badge.qle { background-color: #f0ad4e; }
        .badge.wj { background-color: #777777; }
        .badge.wj-progress { background-color: #777777; color: #fff; }
        .prob-ac { color: #5cb85c; font-weight: bold; }
        .prob-none { color: #777; }

        .kawara-container {
            display: inline-flex;
            flex-direction: column; 
            opacity: 0.9;
            margin-right: 4px; 
            margin-bottom: 2px; 
        }

        @keyframes popUpMove {
            0% { transform: scale(1); box-shadow: 0 0 0 rgba(0,0,0,0); }
            50% { 
                transform: scale(1.03); 
                box-shadow: 0 5px 15px rgba(0,0,0,0.5), 0 0 10px rgba(0, 255, 255, 0.3);
            }
            100% { transform: scale(1); box-shadow: 0 0 0 rgba(0,0,0,0); }
        }
        .pop-up { animation: popUpMove 0.4s ease-in-out; }

        @keyframes cyan-blink { 
            0% { background-color: var(--row-bg); } 
            12.5% { background-color: rgba(0, 255, 255, 0.3); } 
            50% { background-color: rgba(0, 255, 255, 0.8); } 
            87.5% { background-color: rgba(0, 255, 255, 0.1); } 
            100% { background-color: var(--row-bg); } 
        }
        .blink { animation: cyan-blink 0.8s 5; }
    </style>
</head>
<body>

    <div class="main-container">
        <!-- 順位表パネル -->
        <div class="panel score-panel" id="scorePanel">
            <div class="panel-header">
                <div class="header-title-wrap">
                    <span class="neon-cyan">Standings</span>
                    <span class="neon-yellow" id="timerDisplay">待機中...</span>
                </div>
                <div class="header-actions">
                    <button class="popout-btn" onclick="downloadImage('scorePanel', 'Standings')" title="画像としてダウンロード">
                        <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                    </button>
                    <button class="popout-btn" onclick="openPopout('score')" title="ポップアウト">
                        <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
                    </button>
                </div>
            </div>
            <div class="table-container">
                <div class="score-list-wrapper">
                    <div class="header-row" id="scoreHeaderRow" style="display: grid;"></div>
                    <div class="list-container" id="scoreList"></div>
                </div>
            </div>
        </div>

        <!-- 提出一覧パネル -->
        <div class="panel sub-panel" id="subPanel">
            <div class="panel-header">
                <span class="neon-cyan">Submissions</span>
                <div class="header-actions">
                    <button class="popout-btn" onclick="downloadImage('subPanel', 'Submissions')" title="画像としてダウンロード">
                        <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                    </button>
                    <button class="popout-btn" onclick="openPopout('sub')" title="ポップアウト">
                        <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
                    </button>
                </div>
            </div>
            <div class="table-container">
                <div class="sub-list-wrapper">
                    <div class="header-row sub-header-row">
                        <div>User</div>
                        <div>Problem</div>
                        <div>Time</div>
                        <div>Score</div>
                        <div>Result</div>
                    </div>
                    <div class="list-container" id="subList"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const viewMode = params.get('view');
            if (viewMode === 'score') {
                document.getElementById('subPanel').style.display = 'none';
                document.getElementById('scorePanel').style.borderRight = 'none'; 
            } else if (viewMode === 'sub') {
                document.getElementById('scorePanel').style.display = 'none';
                document.getElementById('subPanel').style.paddingLeft = '0';
            }
        });

        function openPopout(type) {
            const url = new URL(window.location.href);
            url.searchParams.set('view', type);
            window.open(url.href, type + 'Window', `width=${type==='score'?800:400},height=600,menubar=no,toolbar=no,location=no,status=no`);
        }

        function downloadImage(panelId, prefix) {
            const targetElement = document.getElementById(panelId);
            html2canvas(targetElement, { backgroundColor: '#1e1e1e', scale: 2 }).then(canvas => {
                const link = document.createElement('a');
                link.download = `${prefix}_VCon_${new Date().getTime()}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
        }

        const ROW_HEIGHT = 34; 
        
        const getRatingColor = rate => {
            if (rate === "-" || rate === undefined || rate === null) return '#ffffff';
            return rate < 400 ? '#999999' : rate < 800 ? '#cc7000' : rate < 1200 ? '#00cc00' : rate < 1600 ? '#00cccc' : rate < 2000 ? '#4444ff' : rate < 2400 ? '#cccc00' : rate < 2800 ? '#ff9900' : '#ff0000';
        };
        
        const getProblemStyle = p => p==='A' ? 'color:#ff4d4d;' : p==='B' ? 'color:#4d4dff;' : p==='C' ? 'color:#ffcc00;' : p==='D' ? 'color:#00cc00;' : p==='E' ? 'color:#00cccc;' : p==='F' ? 'color:#aa00aa;' : p==='G' ? 'color:#ff9900;' : 'background:linear-gradient(to bottom, #ff99cc, #33ccff); -webkit-background-clip:text; -webkit-text-fill-color:transparent;';
        const formatTime = s => (s === undefined || s === null) ? '-' : `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`;

        function getKawaraHtml(dan, colorCode) {
            if (dan <= 0) return ""; 

            let svgs = "";
            for (let i = 0; i < dan; i++) {
                let marginTop = (i === 0) ? "0px" : "-2px";
                svgs += `
                <svg width="10.8" height="4.2" viewBox="0 3 18 7" style="display:block; margin-top:${marginTop}; color:${colorCode};">
                    <path d="M 1,9 L 9,4.4 L 17,9" stroke="currentColor" stroke-width="1.75" fill="none" stroke-linejoin="miter" stroke-linecap="butt"/>
                </svg>`;
            }
            return `<div class="kawara-container" style="margin-right: 1px; margin-bottom: 0px;">${svgs}</div>`;
        }

        /* WEBSOCKET_INJECTION_POINT */
        if (typeof WS_URL === 'undefined') {
            var WS_URL = (window.location.protocol === "https:" ? "wss://" : "ws://") + window.location.host + "/ws";
        }

        const timerDisplay = document.getElementById('timerDisplay');
        const scoreList = document.getElementById('scoreList');
        const scoreHeaderRow = document.getElementById('scoreHeaderRow');
        const subList = document.getElementById('subList');

        let activeProblems = [];
        let gridTemplateColumns = "";
        let standingElements = {};
        let submissionElements = {};
        let previousIndex = {}; 

        function connectWebSocket() {
            const ws = new WebSocket(WS_URL);

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if(data.type === 'update') {
                    if(data.status === 'finished') {
                        timerDisplay.innerHTML = "🏁 終了！ 最終結果";
                        timerDisplay.style.color = "#5cb85c";
                        timerDisplay.style.textShadow = "0 0 2px #5cb85c, 0 0 6px #5cb85c";
                    } else {
                        const remain = Math.max(0, data.total - data.elapsed);
                        timerDisplay.innerHTML = `経過: ${formatTime(data.elapsed)}&emsp;&emsp;残り: ${formatTime(remain)}`;
                    }

                    if(activeProblems.join('') !== data.tasks.join('')) {
                        activeProblems = data.tasks;
                        gridTemplateColumns = `1.2fr 1.5fr 0.9fr 1fr repeat(${activeProblems.length}, 0.7fr) 0.9fr 1.5fr`;
                        scoreHeaderRow.style.gridTemplateColumns = gridTemplateColumns;
                        let headerHTML = `<div>Rank</div><div>User</div><div>Time</div><div>Score</div>`;
                        activeProblems.forEach(p => {
                            headerHTML += `<div style="${getProblemStyle(p)} font-weight:bold;">${p}</div>`;
                        });
                        headerHTML += `<div>Perf</div><div>Rate</div>`;
                        scoreHeaderRow.innerHTML = headerHTML;
                    }

                    updateStandings(data.standings, data.blink_users);
                    updateSubmissions(data.submissions);
                }
            };
            ws.onclose = () => { setTimeout(connectWebSocket, 3000); };
        }
        connectWebSocket();

        function updateStandings(standingsData, blinkUsers) {
            standingsData.forEach((user, index) => {
                let wrapper = standingElements[user.id];
                let content;
                
                if (!wrapper) {
                    wrapper = document.createElement('div');
                    wrapper.className = 'score-wrapper';
                    
                    content = document.createElement('div');
                    content.className = 'score-content';
                    content.id = `content-${user.id}`;
                    
                    wrapper.appendChild(content);
                    scoreList.appendChild(wrapper);
                    standingElements[user.id] = wrapper;
                } else {
                    content = wrapper.querySelector('.score-content');
                }

                content.style.gridTemplateColumns = gridTemplateColumns;

                if (index % 2 === 0) content.classList.add('row-odd');
                else content.classList.remove('row-odd');

                const penText = user.penalties > 0 ? `<span class="pen-text">(${user.penalties})</span>` : '';
                let probsHTML = '';
                activeProblems.forEach(p => {
                    const pd = user.status[p];
                    if (pd && pd.ac_time !== -1) {
                        const p_penText = pd.penalties > 0 ? `<span class="pen-text">(${pd.penalties})</span>` : '';
                        probsHTML += `<div class="prob-cell"><span class="prob-ac">${pd.point}</span>${p_penText}<br><span class="time-text">${formatTime(pd.ac_time)}</span></div>`;
                    } else { probsHTML += `<div><span class="prob-none">-</span></div>`; }
                });

                const perfColor = getRatingColor(user.perf);
                const oldRateColor = getRatingColor(user.old_rate);
                const newRateColor = getRatingColor(user.rate);
                const diff = user.rate - user.old_rate;
                const sign = diff >= 0 ? '+' : '';
                const rateDiffStr = diff !== 0 ? ` <span style="font-size: 0.85em; color: #aaa;">(${sign}${diff})</span>` : '';

                const userDan = user.old_rate <= 0 ? 1 : (user.old_rate >= 2800 ? 0 : Math.floor((user.old_rate % 400) / 100) + 1);
                const kawaraHtml = getKawaraHtml(userDan, oldRateColor);
                
                const displayDiv = `<div style="font-weight: bold; font-size: 1.1em; color: ${oldRateColor}; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; align-items: flex-end;">${kawaraHtml}<span style="line-height: 1;">${user.display}</span></div>`;

                content.innerHTML = `
                    <div style="font-weight: bold; font-size: 1.1em;">${index + 1}<br><span class="vrank-text">(${user.v_rank})</span></div>
                    ${displayDiv}
                    <div class="prob-cell">${formatTime(user.time)}<br>${penText}</div>
                    <div class="score-text">${user.score}</div>
                    ${probsHTML}
                    <div style="color: ${perfColor}; font-weight: bold; font-size: 1.1em;">${user.perf}</div>
                    <div style="font-weight: bold; font-size: 1.1em; white-space: nowrap;">
                        <span style="color: ${oldRateColor};">${user.old_rate}</span> <span style="color: #aaa;">&rarr;</span> <span style="color: ${newRateColor};">${user.rate}</span>${rateDiffStr}
                    </div>
                `;

                let prev = previousIndex[user.id];
                if (prev !== undefined && prev !== index) {
                    wrapper.style.transform = `translateY(${index * ROW_HEIGHT}px)`;
                    if (index < prev) { 
                        wrapper.style.zIndex = 10;
                        content.classList.remove('pop-up');
                        void content.offsetWidth;
                        content.classList.add('pop-up');
                        setTimeout(() => { wrapper.style.zIndex = 1; }, 400);
                    } else { 
                        wrapper.style.zIndex = 0;
                        setTimeout(() => { wrapper.style.zIndex = 1; }, 400);
                    }
                } else {
                    wrapper.style.transform = `translateY(${index * ROW_HEIGHT}px)`;
                }
                previousIndex[user.id] = index;

                if (blinkUsers && blinkUsers.includes(user.id)) {
                    content.classList.remove('blink'); void content.offsetWidth; content.classList.add('blink');
                }
            });
            scoreList.style.height = `${standingsData.length * ROW_HEIGHT}px`;
        }

        function updateSubmissions(subsData) {
            subsData.slice().reverse().forEach((sub, index) => {
                let el = submissionElements[sub.id];
                if (!el) {
                    el = document.createElement('div');
                    el.className = 'sub-item sub-row blink new-entry';
                    el.id = `sub-${sub.id}`;
                    subList.appendChild(el);
                    submissionElements[sub.id] = el;
                    
                    el.style.transform = `translateY(${3 * ROW_HEIGHT}px)`;
                    el.style.opacity = '0';
                    el.offsetHeight; 
                    setTimeout(() => el.classList.remove('new-entry'), 300);
                }

                if (index % 2 === 0) el.classList.add('row-odd');
                else el.classList.remove('row-odd');

                const userColor = getRatingColor(sub.user_rate);
                const probStyle = getProblemStyle(sub.prob);
                
                let resClass = 'wj';
                const resText = sub.result.toUpperCase();
                
                const match = resText.match(/(WA|TLE|RE|MLE|CE|OLE|IE|QLE)/);
                if (resText === 'AC') {
                    resClass = 'ac';
                } else if (match) {
                    resClass = match[0].toLowerCase();
                } else if (resText.includes('/')) {
                    resClass = 'wj-progress';
                }

                const kawaraHtml = getKawaraHtml(sub.dan, userColor);
                const userDiv = `<div style="font-weight: bold; color: ${userColor}; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; align-items: flex-end;">${kawaraHtml}<span style="line-height: 1;">${sub.user}</span></div>`;

                el.innerHTML = `
                    ${userDiv}
                    <div style="${probStyle} font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${sub.prob_title}</div>
                    <div>${formatTime(sub.time)}</div>
                    <div class="score-text" style="font-size: 1em;">${sub.point}</div>
                    <div><span class="badge ${resClass}">${sub.result}</span></div>
                `;
                el.style.transform = `translateY(${index * ROW_HEIGHT}px)`;
                el.style.opacity = '1';
            });
            subList.style.height = `${subsData.length * ROW_HEIGHT}px`;
        }
    </script>
</body>
</html>
